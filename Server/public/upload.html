<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload VenForce</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f1115;
color:white;
padding:40px;
margin:0;
}

.box{
max-width:560px;
margin:40px auto;
background:#1a1f29;
padding:30px;
border-radius:14px;
box-shadow:0 0 20px rgba(0,0,0,0.35);
}

h1{
margin-top:0;
margin-bottom:20px;
font-size:28px;
}

.descricao{
color:#cdd6e1;
margin-bottom:24px;
}

input,button,textarea{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
box-sizing:border-box;
font-size:14px;
}

input,textarea{
border:1px solid #333;
background:#10141c;
color:white;
}

button{
border:none;
background:#2d6cdf;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.95;
}

#msg{
margin-top:16px;
font-size:14px;
min-height:20px;
white-space:pre-wrap;
}

.ok{color:#4cd964}
.erro{color:#ff5c5c}

textarea{
min-height:220px;
resize:vertical;
font-family:Consolas,monospace;
}
</style>
</head>

<body>

<div class="box">

<h1>Upload de Planilha</h1>

<p class="descricao">
Envie a planilha de custos do cliente para o servidor da VenForce.
</p>

<form id="uploadForm">

<input
type="text"
id="baseName"
placeholder="Nome da base (ex: Alma ML)"
required
>

<input
type="file"
id="file"
accept=".xlsx,.xls,.csv,.json"
required
>

<button type="submit">
Enviar planilha
</button>

</form>

<p id="msg"></p>

<textarea
id="debug"
readonly
placeholder="O retorno detalhado aparecerá aqui..."
></textarea>

</div>

<script>

const form = document.getElementById("uploadForm")
const msg = document.getElementById("msg")
const debug = document.getElementById("debug")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const baseName=document.getElementById("baseName").value.trim()
const fileInput=document.getElementById("file")
const file=fileInput.files[0]

if(!baseName){
msg.textContent="Informe o nome da base."
msg.className="erro"
return
}

if(!file){
msg.textContent="Selecione um arquivo."
msg.className="erro"
return
}

try{

msg.textContent="Enviando planilha..."
msg.className=""
debug.value=""

const formData=new FormData()

formData.append("baseName",baseName)
formData.append("file",file)

const response=await fetch("/upload-base",{
method:"POST",
body:formData
})

const raw=await response.text()

debug.value=
"HTTP "+response.status+" "+response.statusText+"\n\n"+raw

let data

try{
data=JSON.parse(raw)
}catch{
data=null
}

if(response.ok && data && data.ok){

msg.textContent=
"Upload concluído!\n\n"+
"Base: "+data.base.nome+"\n"+
"IDs: "+data.base.total_ids

msg.className="ok"

form.reset()

}else{

const erro=
(data && (data.erro||data.mensagem)) ||
raw ||
"Erro no upload"

msg.textContent=erro
msg.className="erro"

}

}catch(error){

msg.textContent="Erro ao enviar: "+error.message
msg.className="erro"
debug.value=String(error.stack||error)

}

})

</script>

</body>
</html>
