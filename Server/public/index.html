<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Base VenForce</title>
<style>
body{
font-family:Arial;
max-width:600px;
margin:40px auto;
}
input,button{
display:block;
margin:10px 0;
padding:10px;
width:100%;
}
pre{
background:#eee;
padding:15px;
}
</style>
</head>

<body>

<h2>Upload de Base</h2>

<form id="form">

<input type="text" name="baseName" placeholder="Nome da base" required>

<input type="file" name="file" required>

<button type="submit">Enviar</button>

</form>

<pre id="resultado"></pre>

<script>

const form = document.getElementById("form")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const formData = new FormData(form)

const response = await fetch("/upload-base",{
method:"POST",
body:formData
})

const data = await response.json()

document.getElementById("resultado").innerText =
JSON.stringify(data,null,2)

})

</script>

</body>
</html>
