<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Fechamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page">

  <div class="vf-main-with-sidebar">
    <main class="vf-content">

      <div class="vf-page-header">
        <h2>Fechamento</h2>
        <p>Upload de planilha de fechamento</p>
      </div>

      <div class="vf-card" style="margin-bottom:24px;">
        <div class="vf-card-header">
          <h5>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Processar fechamento
          </h5>
        </div>

        <div style="padding:1.5rem 1.75rem;">
          <div class="import-grid">
            <div class="vf-form-group" style="margin:0;">
              <label>Planilha (.xlsx)</label>
              <label class="vf-file-label" id="file-label-fechamento">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                <span id="file-label-fechamento-text">Escolher arquivo…</span>
                <input type="file" id="fechamento-arquivo" accept=".xlsx" style="display:none;">
              </label>
            </div>

            <div style="display:flex;align-items:flex-end;">
              <button id="btn-processar" class="vf-btn-primary" style="width:100%;margin-top:0;">
                Processar fechamento
              </button>
            </div>
          </div>

          <div id="fechamento-status" style="margin-top:12px;font-size:.875rem;display:none;"></div>
        </div>
      </div>

      <div id="fechamento-resultado"></div>

    </main>
  </div>

  <script src="layout.js"></script>
  <script src="fechamento.js"></script>
</body>
</html>
