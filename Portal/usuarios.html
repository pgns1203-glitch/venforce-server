<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page">

  <div class="vf-main-with-sidebar">
    <main class="vf-content">

      <div class="vf-page-header">
        <h2>Usuários</h2>
        <p>Gerencie os usuários com acesso ao portal.</p>
      </div>

      <div class="vf-card">
        <div class="vf-card-header">
          <h5>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Usuários cadastrados
          </h5>
          <span id="usuarios-count" class="vf-badge" style="display:none;">0</span>
        </div>

        <div id="usuarios-content" style="min-height:200px;">
          <div id="state-loading" class="vf-loading">
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p>Carregando usuários…</p>
          </div>
          <div id="state-table" class="vf-table-wrapper" style="display:none;">
            <table class="vf-table">
              <thead>
                <tr>
                  <th style="width:50px;">#</th>
                  <th>Nome</th>
                  <th>E-mail</th>
                  <th style="width:130px;">Role</th>
                  <th style="width:140px;text-align:center;">Status</th>
                  <th style="width:140px;">Criado em</th>
                  <th style="width:200px;text-align:center;">Ações</th>
                </tr>
              </thead>
              <tbody id="usuarios-tbody"></tbody>
            </table>
          </div>
          <div id="state-empty" class="vf-empty-state" style="display:none;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="8.5" cy="7" r="4"/>
              <path d="M20 8v6"/>
              <path d="M23 11h-6"/>
            </svg>
            <p>Nenhum usuário encontrado.</p>
          </div>
          <div id="state-error" class="vf-error-state" style="display:none;">
            <p id="error-message">Erro ao carregar dados.</p>
            <button id="btn-retry" class="vf-btn-retry">Tentar novamente</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="layout.js"></script>
  <script src="usuarios.js"></script>
</body>
</html>
