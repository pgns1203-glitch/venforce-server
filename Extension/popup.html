<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>VenForce GO</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      width: 380px;
      margin: 0;
      padding: 16px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3efff;
      color: #2d2d2d;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.10);
    }

    .logo {
      text-align: center;
      font-weight: 800;
      font-size: 20px;
      color: #6b39ff;
      margin-bottom: 14px;
    }

    h3 {
      margin: 0 0 14px 0;
      text-align: center;
      font-size: 16px;
      color: #333;
    }

    h4 {
      margin: 18px 0 10px 0;
      font-size: 14px;
      color: #444;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 10px;
      font-size: 14px;
    }

    input,
    select {
      border: 1px solid #d9d9e6;
      padding: 11px 12px;
      background: #fff;
      outline: none;
      margin-bottom: 10px;
    }

    input:focus,
    select:focus {
      border-color: #7a54ff;
      box-shadow: 0 0 0 3px rgba(122, 84, 255, 0.12);
    }

    button {
      border: none;
      padding: 11px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .btn-primary {
      background: #6b39ff;
      color: #fff;
    }

    .btn-secondary {
      background: #ece7ff;
      color: #4b2ed1;
    }

    .btn-danger {
      background: #ffe4e4;
      color: #b42318;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row > * {
      flex: 1;
    }

    .status {
      min-height: 18px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 6px;
      white-space: pre-line;
    }

    .muted {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }

    .user-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f7f4ff;
      border: 1px solid #e7defe;
    }

    .user-name {
      font-size: 13px;
      font-weight: 700;
      color: #4a3a8b;
      word-break: break-word;
    }

    .divider {
      height: 1px;
      background: #eee8ff;
      margin: 16px 0;
    }

    #appView {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">VenForce GO</div>

    <div id="loginView">
      <h3>Entrar</h3>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="seuemail@dominio.com" />

      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha" />

      <button id="btnLogin" class="btn-primary">Entrar</button>
      <div id="status" class="status"></div>
    </div>

    <div id="appView">
      <div class="user-box">
        <div id="usuarioNome" class="user-name">Usuário logado</div>
        <button id="btnLogout" class="btn-danger" style="width:auto; padding:8px 12px;">
          Sair
        </button>
      </div>

      <h4>Bases</h4>

      <label for="filtroBase">Buscar base</label>
      <input id="filtroBase" type="text" placeholder="Digite para filtrar bases" />

      <label for="basesSelect">Lista de bases</label>
      <select id="basesSelect">
        <option value="">Selecionar base</option>
      </select>

      <div class="row">
        <button id="btnAtualizarBases" class="btn-secondary">Bases</button>
        <button id="btnSalvarBase" class="btn-primary">Usar base selecionada</button>
      </div>

      <div id="baseAtualInfo" class="muted">Base atual: nenhuma</div>
      <div id="statusApp" class="status"></div>

      <div class="divider"></div>

      <h4>Criar nova base</h4>

      <label for="nomeNovaBase">Nome da base</label>
      <input id="nomeNovaBase" type="text" placeholder="Ex.: cliente_xpto" />

      <label for="arquivo">Planilha</label>
      <input id="arquivo" type="file" accept=".xlsx,.xls,.csv" />

      <button id="btnImportar" class="btn-primary">Criar base e importar planilha</button>
      <div id="statusImportacao" class="status"></div>

      <div class="divider"></div>

      <h4>Alterar senha</h4>

      <label for="senhaAtual">Senha atual</label>
      <input id="senhaAtual" type="password" placeholder="Digite a senha atual" />

      <label for="novaSenha">Nova senha</label>
      <input id="novaSenha" type="password" placeholder="Digite a nova senha" />

      <button id="btnTrocarSenha" class="btn-secondary">Alterar senha</button>
      <div id="statusSenha" class="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
